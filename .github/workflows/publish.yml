name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (build + pack + test, no publish, no token required)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Show package info
        run: |
          node -p "const p = require('./package.json'); \`Name: \${p.name}\nVersion: \${p.version}\nFiles: \${p.files?.join(', ') || 'all'}\nBin: \${JSON.stringify(p.bin)}\nEngines: \${JSON.stringify(p.engines)}\`"

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)."
            exit 1
          fi
          echo "✅ Tag $TAG_VERSION matches package.json version."

      - name: "Dry run pack"
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: |
          echo "=== DRY RUN MODE ==="
          echo "No publish, no token required."
          echo
          echo "--- npm pack dry-run ---"
          npm pack --dry-run
          echo
          echo "--- Files that will be published ---"
          npm pack --dry-run --json 2>/dev/null | node -e "let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{ try{ JSON.parse(d).forEach(f=>console.log('  '+f.filename+' ('+f.size+' bytes)')); }catch{} });" || true
          echo
          echo "✅ Dry run complete. No publish performed."

      - name: Configure npm auth
        if: github.event.inputs.dry_run != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "=== Configuring npm auth ==="
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set. Cannot publish."
            echo "::error::Add the secret in: Settings → Secrets and variables → Actions → New repository secret."
            echo "::error::Generate at https://www.npmjs.com/settings/~/tokens (Granular Access Token, publish permission)."
            echo "::error::Or run with 'dry_run: true' input to test without a token."
            exit 1
          fi
          echo "Token length: ${#NODE_AUTH_TOKEN}"
          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
          echo "✅ Auth configured in user .npmrc"

      - name: Verify npm authentication
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "=== Verify authentication ==="
          if ! WHOAMI=$(npm whoami 2>&1); then
            echo "::error::npm whoami failed:"
            echo "$WHOAMI"
            echo
            echo "::error::Token may be invalid, expired, or lack publish permission."
            echo "::error::Verify at https://www.npmjs.com/settings/~/tokens"
            exit 1
          fi
          echo "✅ Authenticated as: $WHOAMI"

      - name: Check npm registry availability
        if: github.event.inputs.dry_run != 'true'
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "=== Registry check ==="
          echo "Local version: $PKG_VERSION"
          if npm view "$PKG_NAME" version >/dev/null 2>&1; then
            LATEST=$(npm view "$PKG_NAME" version)
            echo "Latest on registry: $LATEST"
          else
            echo "Package not yet on registry."
            LATEST=""
          fi
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "::error::Version $PKG_VERSION already published on npm."
            echo "::error::Bump version in package.json (current: $PKG_VERSION, latest on registry: $LATEST)."
            echo "::error::Run: npm version patch  (or minor / major)"
            exit 1
          fi
          if [ -z "$LATEST" ]; then
            echo "First-time publish for $PKG_NAME."
          else
            echo "Publishing $LATEST → $PKG_VERSION."
          fi

      - name: Verify package contents
        if: github.event.inputs.dry_run != 'true'
        run: npm pack --dry-run

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "=== Publishing ==="
          npm publish --access public --provenance
          echo "✅ Published successfully."

      - name: Verify published version
        if: github.event.inputs.dry_run != 'true'
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Waiting for registry to propagate..."
          for i in 1 2 3 4 5 6; do
            sleep 5
            if PUBLISHED=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null); then
              echo "✅ Verified: $PKG_NAME@$PUBLISHED is now on npm registry."
              exit 0
            fi
            echo "Retry $i: not yet visible, waiting..."
          done
          echo "::error::Version $PKG_VERSION not visible on registry after 30s. Check https://www.npmjs.com/package/$PKG_NAME"
          exit 1

      - name: Smoke test published package
        if: github.event.inputs.dry_run != 'true'
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Installing $PKG_NAME@$PKG_VERSION from registry..."
          cd /tmp
          rm -rf test-pkg
          mkdir test-pkg && cd test-pkg
          npm init -y >/dev/null 2>&1
          npm install "$PKG_NAME@$PKG_VERSION" --no-audit --no-fund
          echo "Testing CLI:"
          npx --no-install openspec-generator --version
          npx --no-install openspec-generator --help | head -5

      - name: Create GitHub release
        if: github.event.inputs.dry_run != 'true' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
