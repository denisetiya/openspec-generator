name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (no actual publish)'
        required: false
        default: 'false'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)."
            exit 1
          fi
          echo "Tag $TAG_VERSION matches package.json version."

      - name: Check NPM_TOKEN is set
        if: env.NPM_TOKEN == '' && env.NODE_AUTH_TOKEN == ''
        run: |
          echo "::error::Neither NPM_TOKEN nor NODE_AUTH_TOKEN secret is set. Cannot publish."
          echo "::error::Add the secret in: Settings → Secrets and variables → Actions → New repository secret."
          echo "::error::Generate at https://www.npmjs.com/settings/~/tokens (Granular Access Token, publish permission)."
          exit 1

      - name: Check npm registry availability
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Checking $PKG_NAME@$PKG_VERSION on npm registry..."
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "::error::Version $PKG_VERSION already published."
            exit 1
          fi
          if npm view "$PKG_NAME" version >/dev/null 2>&1; then
            LATEST=$(npm view "$PKG_NAME" version)
            echo "Latest on registry: $LATEST. Publishing: $PKG_VERSION."
          else
            echo "First-time publish for $PKG_NAME."
          fi

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry run mode - skipping actual publish."
            npm publish --dry-run
            exit 0
          fi
          npm publish --access public --provenance
          echo "Published successfully."

      - name: Verify published version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Waiting for registry to propagate..."
          for i in 1 2 3 4 5 6; do
            sleep 5
            if PUBLISHED=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null); then
              echo "✅ Verified: $PKG_NAME@$PUBLISHED is now on npm registry."
              exit 0
            fi
            echo "Retry $i: not yet visible, waiting..."
          done
          echo "::error::Version $PKG_VERSION not visible on registry after 30s. Check https://www.npmjs.com/package/$PKG_NAME"
          exit 1

      - name: Smoke test published package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Installing $PKG_NAME@$PKG_VERSION from registry..."
          cd /tmp
          rm -rf test-pkg
          mkdir test-pkg && cd test-pkg
          npm init -y >/dev/null 2>&1
          npm install "$PKG_NAME@$PKG_VERSION" --no-audit --no-fund
          echo "Testing CLI:"
          npx --no-install openspec-generator --version
          npx --no-install openspec-generator --help | head -5

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
